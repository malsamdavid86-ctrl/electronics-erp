worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Operational tuning parameters
    sendfile        on;
    keepalive_timeout  65;
    
    # Crucial for practical video/image uploads from the certification modules
    client_max_body_size 100M;

    # ====================================================================
    # UPSTREAM ROUTING MAPS (Docker Internal DNS Resolution)
    # ====================================================================
    upstream customer_frontend {
        server public-frontend:3000;
    }

    upstream administration_portal {
        server admin-portal:80;
    }

    upstream express_core_api {
        server core-service:5000;
    }

    upstream fastapi_hr_api {
        server finance-hr-service:8000;
    }

    # ====================================================================
    # PRIMARY HTTP EDGE SERVER
    # ====================================================================
    server {
        listen 80;
        server_name localhost;

        # Shared proxy header structures
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support for WebSockets (Crucial for live streaming & HMR environments)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 1. Core API routing engine (PC Builder & Loyalty Systems)
        location /api/core {
            rewrite ^/api/core/(.*) /$1 break;
            proxy_pass http://express_core_api;
        }

        # 2. Finance and HR API routing engine (Gusto & Certification Processing)
        location /api/admin {
            # Keeps the /api/admin prefix intact for FastAPI routes matching our source
            proxy_pass http://fastapi_hr_api;
        }

        # 3. Dedicated Admin/Employee Portal Interface Access Routing
        location /admin {
            proxy_pass http://administration_portal;
        }

        # 4. Fallback Default Routing - Main Customer Shop Interface
        location / {
            proxy_pass http://customer_frontend;
        }

        # Global Custom Error Handling Overrides
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
