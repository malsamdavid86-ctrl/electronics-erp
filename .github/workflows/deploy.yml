name: Production CI/CD Pipeline

on:
  push:
    branches: [ main ] # Triggers the build sequence when changes hit main branch code

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone the code repository down into the automation runner workspace
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Step 2: Establish an isolated Node runtime environment to handle package validations
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-node-version: '18'
          cache: 'npm'
          cache-dependency-path: './core-service/package-lock.json'

      # Step 3: Audit core dependencies for critical security vulnerabilities
      - name: Verify Component Security
        run: |
          cd core-service
          npm ci
          npm audit --audit-level=high

      # Step 4: Securely authenticates with your remote cloud Docker registry
      - name: Authenticate Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_PROVIDER_URL }} # e.g., index.docker.io or AWS ECR
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      # Step 5: Leverage Docker Buildx for advanced layer-caching and concurrent service compilation
      - name: Setup Docker Buildx Engine
        uses: docker/setup-buildx-action@v3

      # Step 6: Compile and push the production-optimized Core Express Service Image
      - name: Build & Publish Core Service Container
        uses: docker/build-push-action@v5
        with:
          context: ./core-service
          push: true
          tags: ${{ secrets.REGISTRY_PROVIDER_URL }}/electronics-erp-core:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 7: Compile and push the production-optimized public customer portal Next.js standalone Image
      - name: Build & Publish Customer Frontend Container
        uses: docker/build-push-action@v5
        with:
          context: ./public-frontend
          push: true
          tags: ${{ secrets.REGISTRY_PROVIDER_URL }}/electronics-erp-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.yourcompanydomain.com/api/core
          cache-from: type=gha
          cache-to: type=gha,mode=max

  rolling-deployment:
    needs: audit-and-build
    runs-on: ubuntu-latest
    steps:
      # Step 8: Remotely signal the production node host to pull updated images and transition containers
      - name: Execute Live Cluster Rollout
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/electronics-erp
            docker-compose pull
            docker-compose up -d --no-deps core-service public-frontend
            docker image prune -f # Sweep away old, dangling image layers to preserve disk volume space
