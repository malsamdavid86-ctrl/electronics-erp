version: '3.8'

services:
  # 1. API Gateway (Nginx) - The Single Entry Point
  api-gateway:
    image: nginx:alpine
    container_name: cyber_api_gateway
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - public-frontend
      - admin-portal
      - core-service
      - finance-hr-service
    networks:
      - cyber_enterprise_network
    restart: unless-stopped

  # 2. Public Customer Portal (Next.js)
  public-frontend:
    build:
      context: ./public-frontend
      dockerfile: Dockerfile
    container_name: cyber_public_frontend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - cyber_enterprise_network
    restart: unless-stopped

  # 3. Admin & Employee Command Center (React / Vite)
  admin-portal:
    build:
      context: ./admin-portal
      dockerfile: Dockerfile
    container_name: cyber_admin_portal
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - VITE_API_URL=${VITE_API_URL}
    networks:
      - cyber_enterprise_network
    restart: unless-stopped

  # 4. Core Microservice (Node.js / Express) - Handles PC Builder & Loyalty
  core-service:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    container_name: cyber_core_service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${CORE_SERVICE_PORT:-5000}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - LOYALTY_POINTS_MULTIPLIER=${LOYALTY_POINTS_MULTIPLIER}
    depends_on:
      - postgres
      - redis
    networks:
      - cyber_enterprise_network
    restart: unless-stopped

  # 5. Finance & HR Microservice (Python / FastAPI) - Handles Payroll & Certs
  finance-hr-service:
    build:
      context: ./finance-hr-service
      dockerfile: Dockerfile
    container_name: cyber_finance_hr_service
    environment:
      - PORT=${FINANCE_HR_PORT:-8000}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - GUSTO_CLIENT_ID=${GUSTO_CLIENT_ID}
      - GUSTO_API_TOKEN=${GUSTO_API_TOKEN}
      - GUSTO_COMPANY_ID=${GUSTO_COMPANY_ID}
    depends_on:
      - postgres
    networks:
      - cyber_enterprise_network
    restart: unless-stopped

  # 6. Primary Relational Database (PostgreSQL 15)
  postgres:
    image: postgres:15-alpine
    container_name: cyber_postgres_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - cyber_postgres_data:/var/lib/postgresql/data
      # Optional: Auto-scaffold schema on first startup
      - ./core-service/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - cyber_enterprise_network
    restart: unless-stopped

  # 7. In-Memory Cache & Task Queue (Redis)
  redis:
    image: redis:7-alpine
    container_name: cyber_redis_cache
    command: redis-server --requirepass "${REDIS_PASSWORD:-}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - cyber_redis_data:/data
    networks:
      - cyber_enterprise_network
    restart: unless-stopped

networks:
  cyber_enterprise_network:
    driver: bridge

volumes:
  cyber_postgres_data:
    driver: local
  cyber_redis_data:
    driver: local
