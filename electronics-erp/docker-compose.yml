networks:
  erp-mesh:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  shared_uploads:
    driver: local

 # ====================================================================                                                                                                                                                                              
  # Add resource throttling into production compose configurations
  #====================================================================
# Add resource throttling into production compose configurations
services:
  core-service:
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 256M
          version: '3.8'
 # ====================================================================
  # NETWORK ENTRY POINT & REVERSE PROXY
  # ====================================================================
  services:
  api-gateway:
    build:
      context: ./gateway
    container_name: cyber_api_gateway 
    ports:
      - "80:80"
      - "443:443"
    networks:
      - erp-mesh
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - public-frontend
      - admin-portal
      - core-service

  # ====================================================================
  # FRONTEND WORKSPACES
  # ====================================================================
  public-frontend:
    build:
      context: ./public-frontend
      args:
        NEXT_PUBLIC_API_URL: http://api-gateway/api/core
    container_name: cyber_public_frontend
    networks:
      - erp-mesh
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  admin-portal:
    build:
      context: ./admin-portal
      args:
        VITE_API_URL: http://api-gateway/api
    container_name: cyber_admin_portal
    networks:
      - erp-mesh
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ====================================================================
  # BACKEND MICROSERVICES
  # ====================================================================
  core-service:
    build:
      context: ./core-service
    container_name: cyber_core_service
    networks:
      - erp-mesh
    restart: always
    environment:
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=securepassword
      - DB_NAME=electronics_erp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  finance-hr-service:
    build:
      context: ./finance-hr-service
    container_name: cyber_finance_hr_service
    networks:
      - erp-mesh
    restart: always
    volumes:
      - shared_uploads:/var/www/uploads/practical_exams
    environment:
      - PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy

  # ====================================================================
  # DATA INFRASTRUCTURE & STATE ENGINES
  # ====================================================================
  postgres:
    image: postgres:15-alpine
    container_name: cyber_postgres_db
    networks:
      - erp-mesh
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=securepassword
      - POSTGRES_DB=electronics_erp
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d electronics_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cyber_redis_cache
    networks:
      - erp-mesh
    restart: always
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
