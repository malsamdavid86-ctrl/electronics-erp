worker_processes auto;
pid /tmp/nginx.pid; # Diverted to tmp to support non-root execution contexts

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Operational Performance & Information Masking Optimizations
    server_tokens off;
    sendfile on;
    keepalive_timeout 65;

    # Global Security Header Overrides
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ====================================================================
    # UPSTREAM CLUSTER DEFINITIONS
    # ====================================================================
    
    upstream core_cluster {
        server core-service:5000;
    }

    upstream hr_cluster {
        server finance-hr-service:8000;
    }

    # ====================================================================
    # SERVER BLOCK: HTTP (PORT 80) ENFORCED REDIRECTS
    # ====================================================================
    server {
        listen 80;
        server_name electronics-repairhub.com www.electronics-repairhub.com;
        
        # Production Nginx SSL Redirect Rule
        return 301 https://$host$request_uri;
    }

    # ====================================================================
    # SERVER BLOCK: HTTPS (PORT 443) Edge Gateway Reverse Proxy Routing
    # ====================================================================
    server {
        listen 443 ssl;
        server_name electronics-repairhub.com www.electronics-repairhub.com;

        # Production SSL Certificate Storage Paths (Mounted via Volumes)
        ssl_certificate /etc/letsencrypt/live/electronics-repairhub.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/electronics-repairhub.com/privkey.pem;

        # Hardened Cryptographic Parameters
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Core Node.js Microservice Route Interception
        location /api/core/ {
            proxy_pass http://core_cluster/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI HR & Workforce Scheduling Service Route Interception
        location /api/admin/ {
            proxy_pass http://hr_cluster/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend Application Assets Fallback
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}
